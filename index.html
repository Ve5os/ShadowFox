<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowFox</title>
    <style>
        /* ——— Сброс и общие стили ——— */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            padding: 20px;
            margin: 0;
        }

        /* ——— Основная карточка с оранжевой обводкой ——— */
        .shadowfox-card {
            background: #5b5d57;
            border-radius: 56px;
            padding: 50px 60px 60px 60px;
            max-width: 820px;
            width: 100%;
            border: 3px solid #ff8c00;
            box-shadow: 
                0 0 40px rgba(255, 140, 0, 0.15),
                0 0 80px rgba(255, 140, 0, 0.05),
                inset 0 0 80px rgba(255, 140, 0, 0.02);
            backdrop-filter: blur(2px);
            transition: all 0.4s ease;
            text-align: center;
        }

        .shadowfox-card:hover {
            box-shadow: 
                0 0 60px rgba(255, 140, 0, 0.25),
                0 0 120px rgba(255, 140, 0, 0.08);
            border-color: #ffa040;
        }

        /* ——— Время и дата ——— */
        .time-display {
            font-size: 5.5rem;
            font-weight: 300;
            letter-spacing: 6px;
            color: #ff8c00;
            text-shadow: 
                0 0 10px rgba(255, 140, 0, 0.2),
                0 0 20px rgba(255, 140, 0, 0.15),
                0 0 40px rgba(255, 140, 0, 0.1);
            font-variant-numeric: tabular-nums;
            line-height: 1.1;
            margin-bottom: 12px;
            font-family: 'Inter', 'Segoe UI', monospace;
        }

        .date-display {
            font-size: 1.3rem;
            font-weight: 300;
            color: #d97d00;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 32px;
            border-bottom: 1px dashed #4a4c46;
            padding-bottom: 20px;
            text-shadow: 0 0 8px rgba(217, 125, 0, 0.15);
        }

        /* ——— Блок возраста ——— */
        .age-block {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .age-number {
            font-size: 4.2rem;
            font-weight: 600;
            color: #ff9f33;
            text-shadow: 
                0 0 10px rgba(255, 159, 51, 0.2),
                0 0 30px rgba(255, 140, 0, 0.15);
            line-height: 1;
        }

        .age-label {
            font-size: 1.5rem;
            font-weight: 200;
            color: #e08a2b;
            letter-spacing: 4px;
            text-shadow: 0 0 8px rgba(224, 138, 43, 0.15);
        }

        /* ——— Таймер до ДР ——— */
        .countdown-wrapper {
            background: #4a4c46;
            border-radius: 100px;
            padding: 18px 28px;
            margin: 28px 0 32px 0;
            border: 1px solid #3d3f3a;
            display: inline-block;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.4);
        }

        .countdown-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #b36b1a;
            margin-bottom: 6px;
            font-weight: 300;
            text-shadow: 0 0 6px rgba(179, 107, 26, 0.15);
        }

        .countdown-timer {
            font-size: 3.2rem;
            font-weight: 300;
            color: #ffa040;
            text-shadow: 
                0 0 10px rgba(255, 160, 64, 0.2),
                0 0 30px rgba(255, 140, 0, 0.15);
            letter-spacing: 3px;
            font-variant-numeric: tabular-nums;
        }

        .countdown-timer span {
            display: inline-block;
            min-width: 60px;
        }

        /* ——— GIF-контейнер (уменьшенный) ——— */
        .fox-gif-wrapper {
            margin: 25px auto 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        #foxGif {
            display: block;
            width: 200px;
            height: 150px;
            border-radius: 18px;
            background: #5b5d57;
            image-rendering: auto;
            object-fit: cover;
            transition: all 0.4s ease;
        }

        /* ——— Адаптив ——— */
        @media (max-width: 600px) {
            .shadowfox-card {
                padding: 30px 20px 40px 20px;
                border-radius: 36px;
                border-width: 2.5px;
            }
            .time-display {
                font-size: 3.6rem;
                letter-spacing: 3px;
            }
            .date-display {
                font-size: 1rem;
            }
            .age-number {
                font-size: 3rem;
            }
            .countdown-timer {
                font-size: 2.2rem;
            }
            .countdown-timer span {
                min-width: 40px;
            }
            #foxGif {
                width: 160px;
                height: 120px;
            }
        }

        @media (max-width: 420px) {
            .shadowfox-card {
                padding: 20px 15px 30px 15px;
                border-radius: 28px;
                border-width: 2px;
            }
            .time-display {
                font-size: 2.8rem;
                letter-spacing: 2px;
            }
            .countdown-timer {
                font-size: 1.7rem;
            }
            .countdown-timer span {
                min-width: 30px;
            }
            #foxGif {
                width: 130px;
                height: 98px;
            }
            .date-display {
                font-size: 0.85rem;
            }
            .age-number {
                font-size: 2.5rem;
            }
            .age-label {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="shadowfox-card">
    
    <!-- ЧАСЫ -->
    <div class="time-display" id="clock">--:--:--</div>
    <div class="date-display" id="date">---- · -- · ---</div>

    <!-- ВОЗРАСТ -->
    <div class="age-block">
        <span class="age-number" id="ageYears">--</span>
        <span class="age-label" id="ageLabel">лет</span>
    </div>

    <!-- ТАЙМЕР ДО ДНЯ РОЖДЕНИЯ -->
    <div class="countdown-wrapper">
        <div class="countdown-label">⏳ До дня рождения</div>
        <div class="countdown-timer" id="countdown">
            <span id="cdDays">00</span>д 
            <span id="cdHours">00</span>ч 
            <span id="cdMinutes">00</span>м 
            <span id="cdSeconds">00</span>с
        </div>
    </div>

    <!-- GIF-ЛИСИЧКА (уменьшена) -->
    <div class="fox-gif-wrapper">
        <img id="foxGif" src="fox.gif" alt="ShadowFox" width="200" height="150">
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ================================================================
        // 1. ВАША ДАТА РОЖДЕНИЯ (ИЗМЕНИТЕ ПРИ НЕОБХОДИМОСТИ)
        // ================================================================
        const birthday = new Date(2003, 5, 20); // 20 июня 2003

        // ================================================================
        // 2. ЭЛЕМЕНТЫ DOM
        // ================================================================
        const clockEl = document.getElementById('clock');
        const dateEl = document.getElementById('date');
        const ageYearsEl = document.getElementById('ageYears');
        const ageLabelEl = document.getElementById('ageLabel');

        const cdDays = document.getElementById('cdDays');
        const cdHours = document.getElementById('cdHours');
        const cdMinutes = document.getElementById('cdMinutes');
        const cdSeconds = document.getElementById('cdSeconds');

        // ================================================================
        // 3. ФУНКЦИЯ ДЛЯ ПРАВИЛЬНОГО СКЛОНЕНИЯ СЛОВА "ЛЕТ"
        // ================================================================
        function getAgeLabel(age) {
            // Правила склонения для русского языка
            // 1 год, 2-4 года, 5-20 лет, 21 год, 22-24 года, 25-30 лет и т.д.
            const lastDigit = age % 10;
            const lastTwoDigits = age % 100;

            // Исключения: 11-14 лет
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                return 'лет';
            }

            switch (lastDigit) {
                case 1:
                    return 'год';
                case 2:
                case 3:
                case 4:
                    return 'года';
                default:
                    return 'лет';
            }
        }

        // ================================================================
        // 4. ОБНОВЛЕНИЕ ВРЕМЕНИ, ДАТЫ, ВОЗРАСТА И ТАЙМЕРА
        // ================================================================
        function updateTimeAndCountdown() {
            const now = new Date();

            // ——— Часы и дата ———
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            clockEl.textContent = `${hh}:${mm}:${ss}`;

            const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
            const months = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
            const dayName = days[now.getDay()];
            const dayNum = String(now.getDate()).padStart(2, '0');
            const monthName = months[now.getMonth()];
            const year = now.getFullYear();
            dateEl.textContent = `${dayName} · ${dayNum} ${monthName} · ${year}`;

            // ——— Возраст (полных лет) с правильным склонением ———
            let age = now.getFullYear() - birthday.getFullYear();
            const mDiff = now.getMonth() - birthday.getMonth();
            if (mDiff < 0 || (mDiff === 0 && now.getDate() < birthday.getDate())) {
                age--;
            }
            
            if (age >= 0) {
                ageYearsEl.textContent = age;
                ageLabelEl.textContent = getAgeLabel(age);
            } else {
                ageYearsEl.textContent = '0';
                ageLabelEl.textContent = 'лет';
            }

            // ——— Таймер до следующего дня рождения ———
            let nextBirthday = new Date(now.getFullYear(), birthday.getMonth(), birthday.getDate());
            if (now > nextBirthday) {
                nextBirthday = new Date(now.getFullYear() + 1, birthday.getMonth(), birthday.getDate());
            }

            const diffMs = nextBirthday - now;
            if (diffMs <= 0) {
                cdDays.textContent = '00';
                cdHours.textContent = '00';
                cdMinutes.textContent = '00';
                cdSeconds.textContent = '00';
                return;
            }

            const diffSec = Math.floor(diffMs / 1000);
            const d = Math.floor(diffSec / 86400);
            const h = Math.floor((diffSec % 86400) / 3600);
            const m = Math.floor((diffSec % 3600) / 60);
            const s = diffSec % 60;

            cdDays.textContent = String(d).padStart(2, '0');
            cdHours.textContent = String(h).padStart(2, '0');
            cdMinutes.textContent = String(m).padStart(2, '0');
            cdSeconds.textContent = String(s).padStart(2, '0');
        }

        // ================================================================
        // 5. ЗАПУСК
        // ================================================================
        updateTimeAndCountdown();
        setInterval(() => {
            updateTimeAndCountdown();
        }, 1000);
    })();
</script>

</body>
</html>
